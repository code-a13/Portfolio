<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">

  <!-- White circular background -->
  <circle cx="100" cy="100" r="95" fill="white"/>

  <!-- Centered AK -->
  <g transform="translate(0,0)">

    <!-- A -->
    <line x1="60" y1="145" x2="95" y2="55"
          stroke="black"
          stroke-width="20"
          stroke-linecap="round"/>

    <!-- A vertical -->
    <line x1="95" y1="55" x2="95" y2="145"
          stroke="black"
          stroke-width="20"
          stroke-linecap="round"/>

    <!-- K vertical -->
    <line x1="120" y1="55" x2="120" y2="145"
          stroke="black"
          stroke-width="20"
          stroke-linecap="round"/>

    <!-- K upper -->
    <line x1="120" y1="100" x2="160" y2="55"
          stroke="black"
          stroke-width="20"
          stroke-linecap="round"/>

    <!-- K lower -->
    <line x1="120" y1="100" x2="160" y2="145"
          stroke="black"
          stroke-width="20"
          stroke-linecap="round"/>

  </g>

</svg>